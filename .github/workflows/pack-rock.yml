name: Pack rock

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack rock
        id: pack
        uses: canonical/craft-actions/rockcraft-pack@work/refactor-common-components/CRAFT-5201
        with:
          path: 'rock'
          verbosity: 'verbose'
          rockcraft-channel: 'latest/stable'
          revision: ''
          test: false
          ignore: 'unmaintained'

      - name: Validate outputs
        shell: bash
        run: |
          # Verify the output is non-empty
          if [[ -z "${{ steps.pack.outputs.rock }}" ]]; then
            echo "ERROR: 'rock' output is empty"
            exit 1
          fi
          echo "rock output: ${{ steps.pack.outputs.rock }}"

          # Verify the file actually exists on disk
          if [[ ! -f "${{ steps.pack.outputs.rock }}" ]]; then
            echo "ERROR: rock file '${{ steps.pack.outputs.rock }}' does not exist"
            exit 1
          fi

          echo "All output validations passed."

      - name: Upload rock artifact
        uses: actions/upload-artifact@v4
        with:
          name: rock
          path: ${{ steps.pack.outputs.rock }}
