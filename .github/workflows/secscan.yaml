name: Security Scan

on:
  workflow_dispatch:

  pull_request:

  push:
    branches:
      - main

jobs:
  secscan:
    name: Security scan
    runs-on: ubuntu-latest

    permissions:
      contents: read # required by actions/checkout
      actions: write # required to upload the secscan-results artifact

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run secscan
        id: secscan
        uses: canonical/starflow/secscan@work/secscan-action/CRAFT-5208
        with:
          snap-file: snapcraft_18123.snap
          cycle: "26.10"
          release-channel: latest/stable

      - name: Print scan results path
        run: echo "Scan results written to ${{ steps.secscan.outputs.secscan-results }}"
